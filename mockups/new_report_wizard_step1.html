<!doctype html>
<html lang="ka" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wizard Step 1 Screenshot - Report Scheduler</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --brand: #185FA5;
        --bg: #F3F4F6;
        --card: #FFFFFF;
        --border: #E5E7EB;
        --text: #111827;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: rgba(17, 24, 39, 0.45); /* Modal overlay background */
      }
      .hairline {
        border-width: 0.5px;
      }
    </style>
  </head>
  <body class="h-full flex items-center justify-center p-4">
    <!-- Active wizard modal popup mockup -->
    <div class="bg-white w-full max-w-[700px] rounded-xl shadow-2xl overflow-hidden flex flex-col text-left">
      <header class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
        <div>
          <h2 class="text-lg font-bold text-gray-900">ანგარიშის დამატება / რედაქტირება</h2>
          <div class="text-[11px] text-[#185FA5] font-bold mt-1 uppercase tracking-wider">ნაბიჯი 1/2 — სერვერი და კავშირი</div>
        </div>
        <button class="text-gray-400 hover:text-gray-600 font-bold text-lg">&times;</button>
      </header>

      <div class="p-6 space-y-5 overflow-y-auto max-h-[500px]">
        <!-- Form field: Name -->
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">ანგარიშის სახელი</label>
          <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none" value="კვარტალური გაყიდვები Q2" placeholder="მაგ: Sales Report Q2" />
          <span class="block text-[10px] text-gray-400 italic">დაგენერირებულ Excel ფაილს მიებმება მიმდინარე თარიღი ავტომატურად.</span>
        </div>

        <!-- Form field: Destination Folder path selecting -->
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">ფაილის გასავალი საქაღალდე (EXCEL DESTINATION PATH)</label>
          <div class="flex gap-2">
            <input type="text" class="flex-1 px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-sm" value="C:\Reports\Exports" readonly />
            <button class="px-4 py-2 border border-gray-300 hover:bg-gray-50 text-xs font-semibold rounded-lg flex items-center gap-1.5">
              <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
              არჩევა...
            </button>
          </div>
        </div>

        <!-- Source database selector grids -->
        <div class="space-y-2.5">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">მონაცემთა წყარო</label>
          <div class="grid grid-cols-2 gap-4">
            
            <!-- SQL Server selected state -->
            <div class="p-4 border-2 border-[#185FA5] rounded-xl bg-blue-50/50 cursor-pointer relative flex items-center gap-3">
              <div class="w-10 h-10 bg-white border border-[#E0F2FE] text-[#185FA5] font-extrabold text-[11px] rounded-lg flex items-center justify-center">SQL</div>
              <div>
                <h4 class="text-xs font-bold text-gray-900 leading-none">SQL Server</h4>
                <span class="text-[9px] text-gray-400 font-mono">pyodbc Microsoft driver</span>
              </div>
              <div class="absolute top-2 right-2 text-[#185FA5]">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
              </div>
            </div>

            <!-- MySQL unselected -->
            <div class="p-4 border border-gray-200 rounded-xl hover:border-gray-300 cursor-pointer flex items-center gap-3">
              <div class="w-10 h-10 bg-white border border-gray-150 text-teal-600 font-extrabold text-[11px] rounded-lg flex items-center justify-center">MY</div>
              <div>
                <h4 class="text-xs font-bold text-gray-700 leading-none">MySQL</h4>
                <span class="text-[9px] text-gray-400 font-mono">PyMySQL driver</span>
              </div>
            </div>

          </div>
        </div>

        <!-- Connection params grid inputs -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 p-4 bg-slate-50 border border-gray-200/80 rounded-xl">
          <div class="flex flex-col gap-1 text-left">
            <span class="text-[10px] font-semibold text-gray-400 uppercase">სერვერი</span>
            <input type="text" class="px-2.5 py-1.5 border border-gray-300 rounded-lg text-xs" value="192.168.1.55" />
          </div>
          <div class="flex flex-col gap-1 text-left">
            <span class="text-[10px] font-semibold text-gray-400 uppercase">მონაცემთა ბაზა</span>
            <input type="text" class="px-2.5 py-1.5 border border-gray-300 rounded-lg text-xs" value="SalesData_PROD" />
          </div>
          <div class="flex flex-col gap-1 text-left">
            <span class="text-[10px] font-semibold text-gray-400 uppercase">მომხმარებელი</span>
            <input type="text" class="px-2.5 py-1.5 border border-gray-300 rounded-lg text-xs" value="sa" />
          </div>
          <div class="flex flex-col gap-1 text-left">
            <span class="text-[10px] font-semibold text-gray-400 uppercase">პაროლი</span>
            <input type="password" class="px-2.5 py-1.5 border border-gray-300 rounded-lg text-xs" value="••••••••" />
          </div>
        </div>

        <!-- SQL Query input -->
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">SQL QUERY SELECT STATEMENT</label>
          <textarea class="w-full h-24 px-3 py-2 border border-gray-300 rounded-lg text-xs font-mono bg-gray-900 text-green-400 focus:border-[#185FA5] outline-none">SELECT ProductID, SUM(Amount) FROM orders WHERE status = 'Delivered' GROUP BY ProductID</textarea>
        </div>

        <!-- Inline connection tester -->
        <div class="flex items-center justify-between pt-2 border-t border-gray-150">
          <button class="text-xs font-bold text-[#185FA5] px-3.5 py-1.5 border border-blue-200 rounded-lg hover:bg-blue-50/50 flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> კავშირის ტესტი
          </button>
          <div class="text-green-600 font-semibold text-xs flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> კავშირი წარმატებულია
          </div>
        </div>
      </div>

      <!-- Actions Footer mockup -->
      <footer class="p-6 border-t border-gray-150 bg-gray-50 flex justify-end gap-2.5 shrink-0">
        <button class="px-5 py-2 border border-gray-300 rounded-lg text-xs font-semibold text-gray-700 hover:bg-white bg-transparent">გაუქმება</button>
        <button class="bg-[#185FA5] text-white px-6 py-2 rounded-lg text-xs font-semibold">შემდეგი &rarr;</button>
      </footer>
    </div>
  </body>
</html>
